<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Pear Team — State Livability Dashboard</title>

    <style>
        :root {
            --bg: #f6f2e8;
            --card: #ffffff;
            --text: #2f2416;
            --muted: #6b5a43;
            --accent: #c9a66b;
            --accent2: #a67c52;
            --line: rgba(47, 36, 22, 0.10);
            --radius: 16px;
        }

        body {
            margin: 0;
            padding: 32px;
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            background: radial-gradient(900px 380px at 20% 0%, rgba(201, 166, 107, 0.25), transparent 60%), var(--bg);
            color: var(--text);
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 18px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .card .bd {
            max-height: 720px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: linear-gradient(180deg, #c9a66b, #bf995d);
            color: #fff;
            padding: 10px;
            position: sticky;
            top: 0;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .score {
            font-weight: 800;
            color: var(--accent2);
        }

        .kpis {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
        }

        .kpi {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px;
            background: rgba(246, 242, 232, 0.55);
        }

        .kpi .lbl {
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .kpi .val {
            font-size: 18px;
            font-weight: 800;
        }

        input[type="number"] {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 100%;
            margin-top: 4px;
        }

        #updateBtn {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            background: var(--accent2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <header>
        <h1>🏆 State Livability Dashboard</h1>
    </header>

    <div class="grid">
        <!-- LEFT: Top 50 -->
        <div class="card">
            <div class="hd" style="padding:15px;">
                <h2>Top 50 States</h2>
            </div>
            <div class="bd">
                <table>
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>State</th>
                            <th>Score</th>
                            <th>Cost</th>
                            <th>Tax</th>
                        </tr>
                    </thead>
                    <tbody id="rankTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- RIGHT: State Detail -->
        <div class="card">
            <div class="hd" style="padding:15px;">
                <h2>State Detail</h2>
            </div>
            <div class="bd">
                <div style="padding:15px;">
                    <select id="stateSelect" style="width:100%; padding:10px; border-radius:10px;"></select>
                </div>

                <div style="padding:15px; background:rgba(0,0,0,0.03); margin:0 15px 15px; border-radius:12px;">
                    <div style="font-weight:600; font-size:12px;">Importance Weights (0.00 - 1.00)</div>

                    <div id="inputGrid" style="
                        display:grid;
                        grid-template-columns: repeat(3, minmax(90px, 1fr));
                        gap:10px 12px;
                        margin-top:10px;
                    ">
                    </div>

                    <button id="updateBtn">Update Rankings</button>
                </div>

                <div class="kpis" id="kpis"></div>
            </div>
        </div>
    </div>

    <script>
        fetch("data/dashboard_data.json")
            .then(r => r.json())
            .then(data => {
                let rows = data;

                const DEFAULT_W = { w_cost: 0.20, w_safety: 0.18, w_tax: 0.10, w_unemp: 0.18, w_employ: 0.12, w_wage: 0.22 };
                let W = JSON.parse(localStorage.getItem("livability_weights")) || DEFAULT_W;

                function recompute() {
                    const sum = Object.values(W).reduce((a, b) => a + b, 0);
                    const nw = {}; Object.keys(W).forEach(k => nw[k] = W[k] / (sum || 1));

                    rows = data.map(r => ({
                        ...r,
                        livability_score:
                            nw.w_cost * (r.cost_good ?? 0.5) +
                            nw.w_safety * (r.crime_good ?? 0.5) +
                            nw.w_tax * (r.tax_good ?? 0.5) +
                            nw.w_unemp * (r.unemp_good ?? 0.5) +
                            nw.w_employ * (r.employ_good ?? 0.5) +
                            nw.w_wage * (r.wage_good ?? 0.5)
                    }));

                    rows.sort((a, b) => b.livability_score - a.livability_score);
                    rows.forEach((r, i) => r.rank = i + 1);

                    fillTable();
                    renderState(document.getElementById("stateSelect").value || rows[0].state);
                }

                function fillTable() {
                    const tb = document.getElementById("rankTableBody");
                    tb.innerHTML = "";
                    rows.slice(0, 50).forEach(r => {
                        const tr = document.createElement("tr");
                        tr.innerHTML = `
          <td>${r.rank}</td>
          <td>${r.state}</td>
          <td class="score">${r.livability_score.toFixed(3)}</td>
          <td>${r.Cost_of_Living_Index_2025 ?? "—"}</td>
          <td>${r.Top_State_Income_Tax_Rate ?? "—"}%</td>
        `;
                        tr.onclick = () => {
                            document.getElementById("stateSelect").value = r.state;
                            renderState(r.state);
                        };
                        tb.appendChild(tr);
                    });
                }

                function renderState(name) {
                    const s = rows.find(r => r.state === name);
                    const el = document.getElementById("kpis");
                    el.innerHTML = "";

                    const cards = [
                        { l: "Current Rank", v: s.rank, isRank: true },
                        { l: "Score", v: s.livability_score, d: 3 },
                        { l: "Cost Index", v: s.Cost_of_Living_Index_2025 },
                        { l: "Tax Rate", v: s.Top_State_Income_Tax_Rate, s: "%" },
                        { l: "Unemployment", v: s.unemployment_rate, s: "%" },
                        { l: "Employment", v: s.employment_rate, s: "%" },
                        { l: "Wage", v: s.avg_weekly_earnings },
                        { l: "Crime", v: s.violent_crime_rate_per_100k }
                    ];

                    cards.forEach(c => {
                        const d = document.createElement("div");
                        d.className = "kpi";
                        if (c.isRank) d.style.background = "#ececec";
                        d.innerHTML = `
          <div class="lbl">${c.l}</div>
          <div class="val" style="color:${c.isRank ? 'var(--accent2)' : 'inherit'}">
            ${c.v != null ? (c.isRank ? Math.floor(c.v) : c.v.toFixed(c.d ?? 1)) : "—"}${c.s || ""}
          </div>`;
                        el.appendChild(d);
                    });
                }

                const ig = document.getElementById("inputGrid");
                Object.keys(DEFAULT_W).forEach(k => {
                    const div = document.createElement("div");
                    div.innerHTML = `
                    <label style="font-size:10px; display:block; margin-bottom:2px;">
                        ${k.split('_')[1].toUpperCase()}
                    </label>
                    <input 
                        type="number" 
                        step="0.01" 
                        value="${parseFloat(W[k]).toFixed(2)}" 
                        id="in_${k}"
                        style="width:100%; padding:4px 6px; border-radius:6px; border:1px solid #bbb; font-size:12px;"
                    >
                `;


                    ig.appendChild(div);
                });

                document.getElementById("updateBtn").onclick = () => {
                    Object.keys(W).forEach(k => {
                        const val = parseFloat(document.getElementById("in_" + k).value) || 0;
                        W[k] = val;
                        document.getElementById("in_" + k).value = val.toFixed(2);
                    });
                    localStorage.setItem("livability_weights", JSON.stringify(W));
                    recompute();
                };

                const sel = document.getElementById("stateSelect");
                rows.forEach(r => {
                    const o = document.createElement("option");
                    o.value = r.state;
                    o.textContent = r.state;
                    sel.appendChild(o);
                });
                sel.onchange = () => renderState(sel.value);

                recompute();
            });
    </script>

</body>

</html>
